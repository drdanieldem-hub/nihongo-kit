<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>{{APP_TITLE}}</title>
<style>
/* Inline-on-boot styles for instant first paint (avoids flash of unstyled content) */
html, body { background: #f5f4f7; color: #1f2430; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
body.dark { background: #0f1115; color: #e5e7eb; }
* { box-sizing: border-box; margin: 0; padding: 0; }
</style>
<style>{{INLINE_CSS}}</style>
</head>
<body>

<header class="topbar" role="banner">
  <h1 id="topbar-title"><span class="jp-mark">🇯🇵</span>{{SHORT_TITLE}}</h1>
  <button class="icon-btn" id="search-toggle" aria-label="Search phrases" title="Search">🔍</button>
  <button class="icon-btn" id="favorites-toggle" aria-label="Saved phrases" title="Saved">★</button>
  <button class="icon-btn" id="dark-toggle" aria-label="Toggle dark mode" aria-pressed="false" title="Dark mode">🌙</button>
</header>

<div class="searchbar" id="searchbar">
  <input id="search-input" type="search" inputmode="search" autocomplete="off"
         placeholder="Search English or romaji… (e.g. toilet, vegetarian, eki)" aria-label="Search">
  <div class="hint">Tip: try "toilet", "vegetarian", "credit card", or "train"</div>
</div>

<main id="view" role="main" tabindex="-1"></main>

<nav class="tabbar" role="navigation" aria-label="Sections">
  <button class="tab" data-view="survival"          title="Survival Kit">     <span class="ic">🆘</span><span>Survival</span></button>
  <button class="tab" data-view="getting-around"    title="Getting Around">   <span class="ic">🗺</span><span>Around</span></button>
  <button class="tab" data-view="eating"            title="Eating">           <span class="ic">🍱</span><span>Eat</span></button>
  <button class="tab" data-view="numbers-time-money" title="Numbers & Money">  <span class="ic">💴</span><span>Numbers</span></button>
  <button class="tab" data-view="hospitality"       title="Hospitality">      <span class="ic">🎎</span><span>Stay</span></button>
</nav>

<!-- App data, inlined as JSON so it's available offline and search needs no fetch -->
<script type="application/json" id="app-data">{{APP_DATA_JSON}}</script>

<script>{{INLINE_JS}}</script>

</body>
</html>
